<mat-card class="recipe-card" (click)="viewRecipe()">
  @if (recipe.image) {
    <img mat-card-image [src]="recipe.image" [alt]="recipe.name">
  } @else {
    <div class="no-image">
      <mat-icon>restaurant</mat-icon>
    </div>
  }
  
  <mat-card-header>
    <mat-card-title>{{ recipe.name }}</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <div class="recipe-meta">
      <div class="meta-item">
        <mat-icon>schedule</mat-icon>
        <span>{{ recipe.prepTime + recipe.cookTime }} min</span>
      </div>
      <div class="meta-item">
        <mat-icon>people</mat-icon>
        <span>{{ recipe.servings }} servings</span>
      </div>
      <div class="meta-item">
        <mat-icon>list</mat-icon>
        <span>{{ recipe.ingredients.length }} ingredients</span>
      </div>
    </div>
  </mat-card-content>

  <mat-card-actions>
    <button mat-button color="primary" [routerLink]="['/recipe', recipe.id]" (click)="$event.stopPropagation()">
      <mat-icon>visibility</mat-icon>
      View
    </button>
    @if (canManageRecipes) {
      <button mat-button color="accent" [routerLink]="['/recipe', recipe.id, 'edit']" (click)="$event.stopPropagation()">
        <mat-icon>edit</mat-icon>
        Edit
      </button>
      <button mat-button color="warn" (click)="onDelete(); $event.stopPropagation()">
        <mat-icon>delete</mat-icon>
        Delete
      </button>
    }
  </mat-card-actions>
</mat-card>
